# fly.toml app configuration file generated for banterbox-discord-bot on 2026-05-08T03:08:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'banterbox-discord-bot'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

# Discord voice requires a dedicated public IPv4 so UDP return packets
# (Discord voice IP discovery) are routed back to this specific machine.
# Allocate one with: fly ips allocate-v4 --shared -a banterbox-discord-bot

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
