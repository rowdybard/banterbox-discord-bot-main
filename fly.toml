# fly.toml — BanterBox single-app deployment
# Update `app` to match your actual Fly app name if different.
# Run `fly app list` to confirm yours.

app = "banterbox-discord-bot"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine alive so the Discord gateway stays connected.
  # If the machine suspends, the bot disconnects and won't reconnect
  # until the next HTTP request wakes it — unacceptable for a voice bot.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
